<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Atrium</title>
    <meta http-equiv="refresh" content="0; url=/museum/" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #111017;
        --text: #f7f1ee;
        --muted: #c1b4bb;
        --line: rgba(255, 255, 255, 0.08);
        --accent: #f0c0a4;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 16% 0%, #f0b6a91f 0%, transparent 28%),
          radial-gradient(circle at 84% 12%, #b8e4d51a 0%, transparent 24%),
          linear-gradient(180deg, #111017 0%, #0b0a10 100%);
        color: var(--text);
        font-family: "IBM Plex Sans", "Avenir Next", sans-serif;
      }

      main {
        max-width: 560px;
        padding: 28px 30px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(22, 19, 27, 0.94);
        box-shadow: 0 18px 36px #00000052, inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }

      p {
        margin: 0 0 12px;
        line-height: 1.55;
      }

      a {
        color: var(--accent);
      }
    </style>
    <script>
      window.location.replace("/museum/");
    </script>
  </head>
  <body>
    <main>
      <p><strong>Atrium</strong></p>
      <p>Opening the digital sculpture collection.</p>
      <p><a href="/museum/">Open Atrium</a></p>
    </main>
  </body>
</html>
